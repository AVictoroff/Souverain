 owner: AVictoroff
 repo: SOuverain

 sites:
   - name: Souverain Spine
     url: https://app.souverainspine.com/
   - name: API health
     url: https://app.souverainspine.com/api/health
     expectedStatusCodes: [200]
   - name: Auth signup
     url: https://app.souverainspine.com/auth/signup
   - name: Stripe webhook
     url: https://app.souverainspine.com/api/webhooks/stripe
     method: GET
     expectedStatusCodes: [400, 405] # GET is rejected; not 5xx

 status-website:
   cname: status.souverainspine.com
   name: Souverain Spine status
   introTitle: "**Souverain Spine status**"
   introMessage: Real-time uptime, response time, and incident history.
   navbar:
     - title: Status
       href: /
     - title: GitHub
       href: https://github.com/souverainspine/status

 notifications:
   - type: slack
     channel: "#alerts"
     url: $SLACK_WEBHOOK_URL
